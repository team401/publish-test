name: Publish to Maven Central

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

      - name: Publish package
        id: publish
        run: |
          ./gradlew publishAndReleaseToMavenCentral \
            --no-configuration-cache \
            -PRELEASE_SIGNING_ENABLED=true \
            2>&1 | tee publish_output.txt
          exit ${PIPESTATUS[0]}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ORG_GRADLE_PROJECT_SIGNINGINMEMORYKEY }}

      - name: Write job summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## ✅ Maven Central Publish Succeeded" >> $GITHUB_STEP_SUMMARY
            echo "Published successfully. Allow up to 30 min to appear in search." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Maven Central Publish Failed" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "(FAILED|ERROR|Exception|> Task|Could not|Caused by)" publish_output.txt | tail -40 >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Update release notes with publish status
        if: always() && github.event_name == 'release'
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ job.status }}' === 'success';
            const tag = context.ref.replace('refs/tags/', '');
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag
            });
            const status = success
              ? '✅ **Maven Central:** Published successfully'
              : `❌ **Maven Central:** Publish failed — [see run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              body: (release.data.body || '') + `\n\n---\n${status}`
            });

      - name: Open issue on failure
        if: failure() && github.event_name == 'release'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Maven Central publish failed: ${tag}`,
              body: `Publish workflow failed for \`${tag}\`.\n\n[View failed run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug']
            });
